name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: go mod download

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          extension=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            extension=".exe"
          fi
          filename="nmkill-${{ matrix.goos }}-${{ matrix.goarch }}${extension}"
          # 使用 ldflags 注入版本号
          go build -ldflags="-s -w -X github.com/lucaswangdev/nmkill/cmd.version=${{ steps.version.outputs.VERSION }}" -o "${filename}" .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nmkill-${{ matrix.goos }}-${{ matrix.goarch }}.exe
            nmkill-${{ matrix.goos }}-${{ matrix.goarch }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
